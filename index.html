    <script>
      (function () {
        try {
          var url = new URL(window.location.href);
          var params = url.searchParams;
          var id = (params.get("id") || "").trim();
          var isPreviewMode = params.get("mode") === "preview";
          var isDemoMode = params.get("mode") === "demo";
          var isIndexHtmlPath = /\/index\.html$/i.test(url.pathname);

          if (id && isIndexHtmlPath) {
            var prettyPath = url.pathname.replace(/\/index\.html$/i, "/");
            window.history.replaceState(
              null,
              "",
              prettyPath + url.search + url.hash,
            );
          }

          if (!id && !isPreviewMode && !isDemoMode) {
            var createUrl = new URL("./create.html", window.location.href);
            window.location.replace(createUrl.href);
          }
        } catch (_) {
          /* ignore */
        }
      })();
    </script>

    <script>
      (function () {
        function preventZoomKeys(event) {
          if (!(event.ctrlKey || event.metaKey)) return;
          var key = event.key;
          if (
            key === "+" ||
            key === "-" ||
            key === "=" ||
            key === "_" ||
            key === "0"
          ) {
            event.preventDefault();
          }
        }

        document.addEventListener("keydown", preventZoomKeys, {
          passive: false,
        });

        document.addEventListener(
          "wheel",
          function (event) {
            if (event.ctrlKey) {
              event.preventDefault();
            }
          },
          { passive: false },
        );

        document.addEventListener(
          "touchmove",
          function (event) {
            if (event.touches && event.touches.length > 1) {
              event.preventDefault();
            }
          },
          { passive: false },
        );

        ["gesturestart", "gesturechange", "gestureend"].forEach(function (type) {
          document.addEventListener(
            type,
            function (event) {
              event.preventDefault();
            },
            { passive: false },
          );
        });
      })();
    </script>

    <script>
      (function () {
        function isTouchDevice() {
          return (
            "ontouchstart" in window ||
            (typeof navigator !== "undefined" &&
              (navigator.maxTouchPoints || 0) > 0)
          );
        }
        function isPortraitLayout() {
          return window.innerHeight > window.innerWidth;
        }
        function shouldShowOrientationGate() {
          if (!isTouchDevice()) return false;
          if (!isPortraitLayout()) return false;
          var shortSide = Math.min(window.innerWidth, window.innerHeight);
          return shortSide <= 1024;
        }
        function updateOrientationGate() {
          var gate = document.getElementById("orientation-gate");
          if (!gate) return;
          gate.hidden = !shouldShowOrientationGate();
        }
        updateOrientationGate();
        window.addEventListener("resize", updateOrientationGate);
        window.addEventListener("orientationchange", function () {
          setTimeout(updateOrientationGate, 400);
        });
        if (window.visualViewport) {
          window.visualViewport.addEventListener(
            "resize",
            updateOrientationGate,
          );
        }
      })();
    </script>

    <script>
      (function () {
        let raw = "";
        try {
          const params = new URLSearchParams(window.location.search);
          const isPreviewMode = params.get("mode") === "preview";
          const isDemoMode = params.get("mode") === "demo";
          const previewKey = params.get("previewKey") || "";

          // Ưu tiên nhận trực tiếp từ tab tạo (tránh lỗi quota Storage khi ảnh/nhạc lớn)
          if (
            isPreviewMode &&
            previewKey &&
            window.opener &&
            window.opener.__HB_PREVIEW_TRANSFER_MAP &&
            window.opener.__HB_PREVIEW_TRANSFER_MAP[previewKey]
          ) {
            window.__HB_PREVIEW_DATA =
              window.opener.__HB_PREVIEW_TRANSFER_MAP[previewKey];
            try {
              delete window.opener.__HB_PREVIEW_TRANSFER_MAP[previewKey];
            } catch (_) {
              /* ignore */
            }
          }

          if (!window.__HB_PREVIEW_DATA && previewKey) {
            raw = localStorage.getItem(previewKey) || "";
          }
          if (!raw) {
            raw = sessionStorage.getItem("hbPreviewData") || "";
          }
          if (!window.__HB_PREVIEW_DATA && raw) {
            window.__HB_PREVIEW_DATA = JSON.parse(raw);
          }
          if (!window.__HB_PREVIEW_DATA) return;

          if (isPreviewMode && !isDemoMode) {
            const styleEl = document.createElement("style");
            styleEl.textContent = `
              .preview-watermark {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 9999;
                opacity: 0.18;
                background-image: repeating-linear-gradient(
                  -28deg,
                  transparent 0 72px,
                  rgba(255, 95, 168, 0.22) 72px 76px,
                  transparent 76px 220px
                );
              }
              .preview-watermark::before {
                content: "Xem Demo   Xem Demo   Xem Demo   Xem Demo   Xem Demo";
                position: absolute;
                inset: 0;
                display: grid;
                place-items: center;
                color: #ff5fa8;
                font-size: clamp(34px, 7vw, 72px);
                font-weight: 700;
                letter-spacing: 3px;
                text-transform: uppercase;
                transform: rotate(-28deg) scale(1.2);
                white-space: nowrap;
              }
            `;
            document.head.appendChild(styleEl);

            const watermarkEl = document.createElement("div");
            watermarkEl.className = "preview-watermark";
            watermarkEl.setAttribute("aria-hidden", "true");
            document.body.appendChild(watermarkEl);
          }
        } catch (_) {
          window.__HB_PREVIEW_DATA = null;
        }
      })();
    </script>
    <script src="js/hbGiftBootstrap.js"></script>
    <script>
      (function () {
        const FALLBACK_TRACK_URL =
          "./assets/audios/Happy Birthday to You  - AMEE x Hoàng Dũng.mp3";
        const audio = new Audio();
        audio.preload = "auto";
        audio.volume = 0.9;
        audio.loop = true;

        let started = false;
        let activeTrackUrl = FALLBACK_TRACK_URL;
        /** @type {string[]} */
        let availableTracks = [FALLBACK_TRACK_URL];

        function sanitizeTrackUrl(url) {
          if (typeof url !== "string") return "";
          const value = url.trim();
          if (!value) return "";
          if (value.startsWith("data:audio/")) return value;
          return value.toLowerCase().endsWith(".mp3") ? value : "";
        }

        function normalizeTrackList(input) {
          if (!Array.isArray(input)) return [];
          return input
            .map((item) => {
              if (typeof item === "string") return sanitizeTrackUrl(item);
              if (item && typeof item === "object") {
                return sanitizeTrackUrl(item.url);
              }
              return "";
            })
            .filter(Boolean);
        }

        function pickActiveTrack(preferredTrack, tracks) {
          const preferred = sanitizeTrackUrl(preferredTrack);
          if (preferred) return preferred;
          if (tracks.length) return tracks[0];
          return FALLBACK_TRACK_URL;
        }

        function playActiveTrack() {
          if (!activeTrackUrl) return;
          if (
            audio.src !== new URL(activeTrackUrl, window.location.href).href
          ) {
            audio.src = activeTrackUrl;
          }
          audio.play().catch(() => {
            started = false;
          });
        }

        /**
         * Dữ liệu có thể trả về từ server:
         * {
         *   tracks: string[] | Array<{url: string}>,
         *   selectedTrackUrl?: string
         * }
         * - Hỗ trợ cả file mp3 người dùng upload (server trả URL .mp3).
         */
        window.setBirthdayMusicData = function (data) {
          const tracksFromServer = normalizeTrackList(data?.tracks);
          availableTracks = tracksFromServer.length
            ? tracksFromServer
            : [FALLBACK_TRACK_URL];
          activeTrackUrl = pickActiveTrack(
            data?.selectedTrackUrl,
            availableTracks,
          );

          if (started) {
            playActiveTrack();
          }
        };

        window.startBirthdayMusic = function () {
          if (started || !activeTrackUrl) return;
          started = true;
          playActiveTrack();
        };

        window.getBirthdayMusicState = function () {
          return {
            started,
            activeTrackUrl,
            availableTracks: [...availableTracks],
          };
        };

        const previewMusic = window.__HB_PREVIEW_DATA?.music;
        if (previewMusic) {
          window.setBirthdayMusicData(previewMusic);
        }
      })();
    </script>
    <script>
      (function () {
        function isPreviewMode() {
          try {
            return (
              new URLSearchParams(window.location.search).get("mode") ===
              "preview"
            );
          } catch (_) {
            return false;
          }
        }

        if (window.__HB_DEV_IMAGE_FLY_ONLY) return;
        var btn = document.getElementById("gift-tap-btn");
        var screen = document.getElementById("gift-tap-screen");
        if (!btn || !screen) return;

        function proceed() {
          if (window.__giftTapProceeding) return;
          window.__giftTapProceeding = true;
          if (typeof window.startBirthdayMusic === "function") {
            window.startBirthdayMusic();
          }

          /* Luồng: hộp quà → introCake → album (scene-book) → thư → imageFly */
          var ic = document.getElementById("intro-cake-screen");
          if (ic) ic.removeAttribute("hidden");
          try {
            var introSvg = document.getElementById("intro-cake-svg");
            if (introSvg && typeof introSvg.setCurrentTime === "function") {
              introSvg.setCurrentTime(0);
            }
          } catch (_) {}

          screen.classList.add("gift-tap-screen--leaving");
          window.setTimeout(function () {
            screen.setAttribute("hidden", "");
          }, 480);
        }

        btn.addEventListener("click", proceed);
        btn.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            proceed();
          }
        });

        if (isPreviewMode()) {
          window.setTimeout(function () {
            proceed();
          }, 80);
        }
      })();
    </script>

    <script>
      (function () {
        if (!window.__HB_DEV_IMAGE_FLY_ONLY) return;
        var loadOverlay = document.getElementById("imagefly-load-overlay");
        function setImageFlyLoadProgress(p) {
          var bar = document.getElementById("imagefly-load-bar");
          var pctEl = document.getElementById("imagefly-load-pct");
          var n = Math.max(0, Math.min(100, Math.round(p)));
          if (bar) bar.style.width = n + "%";
          if (pctEl) pctEl.textContent = n + "%";
        }
        if (loadOverlay) {
          loadOverlay.removeAttribute("hidden");
          loadOverlay.hidden = false;
          loadOverlay.setAttribute("aria-busy", "true");
          loadOverlay.setAttribute("aria-hidden", "false");
          setImageFlyLoadProgress(0);
        }
        window.requestAnimationFrame(function () {
          window.requestAnimationFrame(function () {
            if (typeof window.initCakeFlyBackground === "function") {
              window.initCakeFlyBackground();
            }
            if (typeof window.initImageFlyScene === "function") {
              window.initImageFlyScene({
                onProgress: setImageFlyLoadProgress,
              });
            }
            window.dispatchEvent(new Event("resize"));
          });
        });
      })();
    </script>
